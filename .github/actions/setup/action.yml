name: Setup
description: >-
  Check out the file:-linked sibling repos (@ambiently-work/faux and
  @ambiently-work/vfs) alongside agent-sdk, set up Bun, and run bun install in
  every workspace.

  The caller is responsible for checking out agent-sdk into
  `ambiently-work/agent-sdk` before invoking this action (required so that the
  action file itself is available on disk). This action then lays down the
  siblings at `ambiently-work/faux` and `ambiently-work/mirage`, which makes
  the `file:../faux` and `file:../../ambiently-work/mirage` paths in
  package.json resolve correctly.

inputs:
  faux-ref:
    description: Git ref to check out in the faux repo
    required: false
    default: feat/integrate-agent-tools
  mirage-ref:
    description: Git ref to check out in the mirage repo (provides @ambiently-work/vfs)
    required: false
    default: feat/git-integration
  bun-version:
    description: Bun version to install
    required: false
    default: latest

outputs:
  agent-sdk-path:
    description: Absolute path to the checked-out agent-sdk working directory
    value: ${{ github.workspace }}/ambiently-work/agent-sdk

runs:
  using: composite
  steps:
    - name: Checkout @ambiently-work/faux
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: ambiently-work/faux
        ref: ${{ inputs.faux-ref }}
        path: ambiently-work/faux

    - name: Checkout @ambiently-work/vfs (mirage)
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: ambiently-work/mirage
        ref: ${{ inputs.mirage-ref }}
        path: ambiently-work/mirage

    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install sibling deps (faux)
      shell: bash
      working-directory: ambiently-work/faux
      run: bun install --frozen-lockfile

    - name: Install sibling deps (mirage)
      shell: bash
      working-directory: ambiently-work/mirage
      run: bun install --frozen-lockfile

    - name: Install agent-sdk deps
      shell: bash
      working-directory: ambiently-work/agent-sdk
      run: bun install --frozen-lockfile
