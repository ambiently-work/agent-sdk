version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - automated
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    ignore:
      - dependency-name: "@ambiently-work/*"
    groups:
      anthropic-stack:
        patterns:
          - "@anthropic-ai/*"
          - "@modelcontextprotocol/*"
      providers:
        patterns:
          - "@google/genai"
          - "@openai/*"
          - "@lmstudio/*"
          - "ollama"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - automated
    commit-message:
      prefix: "ci(deps)"
      include: scope
    groups:
      actions:
        patterns:
          - "*"
