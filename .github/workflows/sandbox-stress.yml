name: Sandbox stress

on:
  workflow_dispatch:
  schedule:
    # Nightly guard against re-introducing the issue #26 flake.
    - cron: "37 6 * * *"

concurrency:
  group: sandbox-stress-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    working-directory: ambiently-work/agent-sdk

jobs:
  test-sandbox-stress:
    name: Test (sandbox stress, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Loops the sandbox suite 10x; one transient failure trips the check.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Stress sandbox tests (10x)
        env:
          FORCE_COLOR: "1"
          MINIFLARE_TMPDIR: /tmp/mf
          STRESS_RUNS: "10"
        run: |
          mkdir -p "$MINIFLARE_TMPDIR"
          bun run test:sandbox:stress
