name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly sandbox stress run to catch a re-introduction of issue #26.
    - cron: "37 6 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: ambiently-work/agent-sdk

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap checkout (for composite action)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - name: Setup workspace
        uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Biome check
        run: bun run check

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Run tsc --noEmit (CI filter)
        run: bun run typecheck:ci

  test-unit:
    name: Test (unit, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Run unit tests
        env:
          FORCE_COLOR: "1"
        run: bun run test:unit

  test-sandbox:
    name: Test (sandbox, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Run sandbox tests
        env:
          FORCE_COLOR: "1"
          # Force a short tmpdir so workerd's AF_UNIX socket paths stay under
          # the 108-byte sun_path limit. See WorkerdBackend / issue #26.
          MINIFLARE_TMPDIR: /tmp/mf
        run: |
          mkdir -p "$MINIFLARE_TMPDIR"
          bun run test:sandbox

  test-sandbox-stress:
    name: Test (sandbox stress, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Long-running guard against re-introducing the issue #26 flake — only
    # runs on manual dispatch / schedule so PRs stay fast. Loops the sandbox
    # suite 10x; one transient failure trips the check.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Stress sandbox tests (10x)
        env:
          FORCE_COLOR: "1"
          MINIFLARE_TMPDIR: /tmp/mf
          STRESS_RUNS: "10"
        run: |
          mkdir -p "$MINIFLARE_TMPDIR"
          bun run test:sandbox:stress

  preamble-fresh:
    name: Preamble up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk
      - uses: ./ambiently-work/agent-sdk/.github/actions/setup
      - name: Rebuild preamble
        id: rebuild
        continue-on-error: true
        run: bun run build:preamble
      - name: Verify no drift
        if: steps.rebuild.outcome == 'success'
        run: |
          if ! git diff --quiet -- 'src/**/zod.bundle.ts'; then
            echo "::error::zod.bundle.ts is out of date. Run 'bun run build:preamble' and commit the result."
            git diff --stat -- 'src/**/zod.bundle.ts'
            exit 1
          fi

  ci-status:
    name: CI status
    if: always()
    needs: [lint, typecheck, test-unit, test-sandbox]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Fail if any required job failed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_UNIT_RESULT: ${{ needs.test-unit.result }}
          TEST_SANDBOX_RESULT: ${{ needs.test-sandbox.result }}
        run: |
          if [ "$LINT_RESULT" != "success" ] \
            || [ "$TYPECHECK_RESULT" != "success" ] \
            || [ "$TEST_UNIT_RESULT" != "success" ] \
            || [ "$TEST_SANDBOX_RESULT" != "success" ]; then
            echo "One or more required jobs failed." >&2
            exit 1
          fi
