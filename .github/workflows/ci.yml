name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome check
        run: bun run check

  typecheck:
    name: Typecheck (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tsc --noEmit
        run: bun run typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun test
        env:
          FORCE_COLOR: "1"

  preamble-fresh:
    name: Preamble up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Rebuild preamble
        id: rebuild
        continue-on-error: true
        run: bun run build:preamble
      - name: Verify no drift
        if: steps.rebuild.outcome == 'success'
        run: |
          if ! git diff --quiet -- 'src/**/zod.bundle.ts'; then
            echo "::error::zod.bundle.ts is out of date. Run 'bun run build:preamble' and commit the result."
            git diff --stat -- 'src/**/zod.bundle.ts'
            exit 1
          fi

  ci-status:
    name: CI status
    if: always()
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [ "$LINT_RESULT" != "success" ] \
            || [ "$TYPECHECK_RESULT" != "success" ] \
            || [ "$TEST_RESULT" != "success" ]; then
            echo "One or more required jobs failed." >&2
            exit 1
          fi
