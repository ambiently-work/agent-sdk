name: Bump faux

on:
  repository_dispatch:
    types: [faux-released]
  workflow_dispatch:
    inputs:
      version:
        description: "Version of @ambiently-work/faux to bump to (e.g. 0.1.2)"
        required: true
        type: string

concurrency:
  group: bump-faux
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump @ambiently-work/faux
    runs-on: ubuntu-latest
    env:
      PACKAGE: "@ambiently-work/faux"
    defaults:
      run:
        working-directory: ambiently-work/agent-sdk
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: ambiently-work/agent-sdk

      - name: Resolve target version
        id: target
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${DISPATCH_VERSION:-$INPUT_VERSION}"
          if [ -z "$VERSION" ]; then
            echo "No version supplied via dispatch payload or workflow input" >&2
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=chore/bump-faux-$VERSION" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Read current version
        id: current
        run: |
          set -euo pipefail
          CURRENT=$(bun --print "JSON.parse(await Bun.file('package.json').text()).dependencies?.['$PACKAGE'] ?? ''")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Update dependency
        env:
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          set -euo pipefail
          bun add "$PACKAGE@$VERSION"

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- package.json bun.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup workspace (sibling repos + install)
        if: steps.diff.outputs.changed == 'true'
        uses: ./ambiently-work/agent-sdk/.github/actions/setup

      - name: Lint
        if: steps.diff.outputs.changed == 'true'
        run: bun run check

      - name: Typecheck
        if: steps.diff.outputs.changed == 'true'
        run: bun run typecheck:ci

      - name: Unit tests
        if: steps.diff.outputs.changed == 'true'
        run: bun run test:unit

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          path: ambiently-work/agent-sdk
          branch: ${{ steps.target.outputs.branch }}
          base: main
          commit-message: "chore(deps): bump @ambiently-work/faux to ${{ steps.target.outputs.version }}"
          title: "chore(deps): bump @ambiently-work/faux to ${{ steps.target.outputs.version }}"
          body: |
            Automated bump in response to a new `@ambiently-work/faux` release.

            - Previous range: `${{ steps.current.outputs.current }}`
            - New version: `${{ steps.target.outputs.version }}`
            - Triggered by: `${{ github.event_name }}`

            CI has already run `bun run check` and `bun test` on this branch.
          labels: |
            dependencies
            automated
          delete-branch: true
